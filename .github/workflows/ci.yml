name: Specter CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Configure prebuilt BoringSSL
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            echo "BORING_BSSL_PATH=${{ github.workspace }}/lib/boringssl/aarch64-apple-darwin" >> $GITHUB_ENV
          else
            echo "BORING_BSSL_PATH=${{ github.workspace }}/lib/boringssl/x86_64-apple-darwin" >> $GITHUB_ENV
          fi

      - run: cargo fmt -- --check
      - run: cargo nextest run --all-features --profile ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

      - name: Run examples
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            cargo run --example fingerprint_validation
            cargo run --example protocol_test

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        run: brew install zig

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build
        run: |
          chmod +x scripts/zig-cc-* scripts/zig-cxx-*
          just zigbuild ${{ matrix.target }}

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Build
        run: cargo xwin build --release --target ${{ matrix.target }} --lib
