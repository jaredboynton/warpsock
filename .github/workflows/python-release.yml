name: Python Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/python/**'
      - '.github/workflows/python-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      # QEMU required for aarch64 builds on x86_64 runners
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
          manylinux: manylinux_2_28
          # Use prebuilt BoringSSL from repo
          env: |
            BORING_BSSL_PATH=/home/runner/work/specter/specter/lib/boringssl/${{ matrix.target }}-unknown-linux-gnu
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  musllinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      # QEMU required for aarch64 builds on x86_64 runners
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
          manylinux: musllinux_1_2
          # Use prebuilt BoringSSL from repo (only x86_64-musl available, aarch64 falls back to build)
          env: |
            BORING_BSSL_PATH=/home/runner/work/specter/specter/lib/boringssl/${{ matrix.target }}-unknown-linux-musl
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      
      # Setup Python with correct architecture for the target
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.target }}
      
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
        env:
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}\lib\boringssl\x86_64-pc-windows-msvc
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
        env:
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/${{ matrix.target }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev
      # maturin develop requires a virtualenv - create one explicitly
      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest pytest-asyncio
      - name: Build and install (maturin develop)
        run: |
          . .venv/bin/activate
          maturin develop --release -m bindings/python/Cargo.toml
        env:
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/x86_64-unknown-linux-gnu
      - name: Run tests
        run: |
          . .venv/bin/activate
          cd bindings/python
          pytest tests/ -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
